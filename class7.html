<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inverse Functions — Practice Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Code+Pro:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --border: #d4c9a8;
    --accent: #2d6a4f;
    --accent2: #e76f51;
    --accent3: #457b9d;
    --text: #1a1a2e;
    --muted: #6b6b6b;
    --correct: #2d6a4f;
    --wrong: #c0392b;
    --num-bg: #2d6a4f;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 60px;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(45,106,79,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(231,111,81,0.05) 0%, transparent 50%);
  }
  header { max-width: 860px; margin: 0 auto 36px; text-align: center; }
  header h1 { font-family: 'Lora', serif; font-size: 2.2rem; font-weight: 600; color: var(--accent); }
  header p { margin-top: 8px; font-size: 1rem; color: var(--muted); font-style: italic; font-family: 'Lora', serif; }
  .score-bar {
    max-width: 860px; margin: 0 auto 28px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 14px 22px;
    display: flex; align-items: center; gap: 20px;
    box-shadow: var(--shadow);
  }
  .score-bar span { font-size: 0.95rem; color: var(--muted); }
  .score-bar strong { font-size: 1.1rem; color: var(--accent); white-space: nowrap; }
  .progress-track { flex: 1; height: 8px; background: #e8e0cc; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #52b788); border-radius: 99px; transition: width 0.5s ease; width: 0%; }
  .questions { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  .card {
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 18px; padding: 0; overflow: hidden;
    box-shadow: var(--shadow); transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .card-img { width: 100%; display: block; border-bottom: 1.5px solid var(--border); }
  .card-body { padding: 20px 24px 24px; }
  .answer-section-label {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--accent2); margin-bottom: 10px;
  }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-btn {
    background: #f9f6ef; border: 1.5px solid var(--border);
    border-radius: 10px; padding: 11px 16px;
    text-align: left; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-size: 0.93rem; color: var(--text);
    transition: all 0.18s; display: flex; align-items: center; gap: 10px;
  }
  .option-btn:hover:not(:disabled) { background: #edf2ee; border-color: var(--accent); }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 6px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.78rem; flex-shrink: 0; transition: background 0.18s;
  }
  .option-btn.correct { background: #d8f3dc; border-color: var(--correct); color: var(--correct); }
  .option-btn.correct .opt-letter { background: var(--correct); color: white; }
  .option-btn.wrong { background: #fde8e6; border-color: var(--wrong); color: var(--wrong); }
  .option-btn.wrong .opt-letter { background: var(--wrong); color: white; }
  .option-btn:disabled { cursor: default; }
  .input-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
  .input-label { font-family: 'Source Code Pro', monospace; font-size: 0.93rem; color: var(--muted); min-width: 110px; }
  .answer-input {
    border: 1.5px solid var(--border); border-radius: 9px; padding: 9px 14px;
    font-family: 'Source Code Pro', monospace; font-size: 0.93rem;
    background: #f9f6ef; color: var(--text); width: 200px;
    transition: border-color 0.2s; outline: none;
  }
  .answer-input:focus { border-color: var(--accent3); background: white; }
  .answer-input.correct { border-color: var(--correct); background: #d8f3dc; color: var(--correct); }
  .answer-input.wrong { border-color: var(--wrong); background: #fde8e6; color: var(--wrong); }
  .unit-label { color: var(--muted); font-size: 0.88rem; font-family: 'Source Code Pro', monospace; }
  .check-btn {
    background: var(--accent3); color: white; border: none;
    border-radius: 9px; padding: 9px 18px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem;
    cursor: pointer; transition: background 0.18s, transform 0.1s;
  }
  .check-btn:hover { background: #2c5f7a; transform: translateY(-1px); }
  .check-btn:active { transform: translateY(0); }
  .feedback {
    margin-top: 12px; font-size: 0.88rem; border-radius: 9px;
    padding: 10px 14px; display: none; line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: #d8f3dc; color: #1b5e2e; border: 1px solid #a8d5b5; }
  .feedback.wrong-fb { background: #fde8e6; color: #7f1d1d; border: 1px solid #f5b8b0; }
  .reset-all { max-width: 860px; margin: 32px auto 0; display: flex; justify-content: center; }
  .reset-btn {
    background: transparent; border: 2px solid var(--accent2); color: var(--accent2);
    border-radius: 11px; padding: 11px 28px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
    cursor: pointer; transition: all 0.18s;
  }
  .reset-btn:hover { background: var(--accent2); color: white; }
</style>
</head>

      html += `<div class="feedback" id="fb-${q.id}"></div>`;
    }

    if (q.type === 'multi-input') {
      q.inputs.forEach((inp, ii) => {
        html += `<div class="input-row">
          <span class="input-label">${inp.label}</span>
          <input class="answer-input" id="inp-${q.id}-${ii}" placeholder="${inp.placeholder}"
            onkeydown="if(event.key==='Enter') checkInput(${q.id},${ii})" />
          ${inp.unit ? `<span class="unit-label">${inp.unit}</span>` : ''}
          <button class="check-btn" onclick="checkInput(${q.id},${ii})">Check</button>
        </div>
        <div class="feedback" id="fb-${q.id}-${ii}"></div>`;
      });
    }

    html += `</div>`;
    card.innerHTML = html;
    container.appendChild(card);
  });
  updateScore();
}

function checkMCQ(qid, selected) {
  const q = questions.find(x => x.id === qid);
  if (answered.has(`mcq-${qid}`)) return;
  const letters = ['A','B','C','D'];
  q.options.forEach((_, oi) => {
    const btn = document.getElementById(`opt-${qid}-${oi}`);
    btn.disabled = true;
    if (oi === q.answer) btn.classList.add('correct');
    else if (oi === selected) btn.classList.add('wrong');
  });
  answered.add(`mcq-${qid}`);
  const fb = document.getElementById(`fb-${qid}`);
  if (selected === q.answer) {
    correct.add(`mcq-${qid}`);
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `✅ Correct! ${q.explanation}`;
  } else {
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ Not quite. Correct answer: <strong>${letters[q.answer]}: ${q.options[q.answer]}</strong>. ${q.explanation}`;
  }
  updateScore();
}

function checkInput(qid, ii) {
  const q = questions.find(x => x.id === qid);
  const inp = q.inputs[ii];
  const field = document.getElementById(`inp-${qid}-${ii}`);
  const fb = document.getElementById(`fb-${qid}-${ii}`);
  const key = `inp-${qid}-${ii}`;
  if (answered.has(key)) return;
  const userVal = field.value.trim().toLowerCase().replace(/\s+/g,'');
  const correctVal = inp.answer.toLowerCase().replace(/\s+/g,'');
  const alts = (inp.alternatives || []).map(a => a.toLowerCase().replace(/\s+/g,''));
  const isCorrect = userVal === correctVal || alts.includes(userVal);
  answered.add(key);
  field.disabled = true;
  if (isCorrect) {
    correct.add(key);
    field.classList.add('correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `✅ Correct! ${inp.explanation}`;
  } else {
    field.classList.add('wrong');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `❌ Correct answer: <strong>${inp.answer}${inp.unit ? ' ' + inp.unit : ''}</strong>. ${inp.explanation}`;
  }
  updateScore();
}

function updateScore() {
  let total = 0;
  questions.forEach(q => {
    if (q.type === 'mcq') total++;
    if (q.type === 'multi-input') total += q.inputs.length;
  });
  document.getElementById('scoreDisplay').textContent = `${correct.size} / ${total} correct`;
  document.getElementById('progressFill').style.width = `${(answered.size/total)*100}%`;
}

function resetAll() {
  answered.clear();
  correct.clear();
  buildQuestions();
}

buildQuestions();
</script>
