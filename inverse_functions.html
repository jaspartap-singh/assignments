<script>
// ─── Graph drawing engine ───────────────────────────────────────────
const COLORS = {
  grid:"rgba(255,255,255,0.06)", axis:"#475569", muted:"#94a3b8", curve:"#6366f1"
};

function drawGraph(canvas, opts){
  const {
    width=280, height=220, xMin=-3, xMax=3, yMin=-2, yMax=6,
    curves=[], label="", tickStep=1, xLabel="x", yLabel="y",
    shadeIntervals=[], extraLines=[]
  } = opts;

  const dpr = window.devicePixelRatio||1;
  canvas.width = width*dpr; canvas.height = height*dpr;
  canvas.style.width = width+"px"; canvas.style.height = height+"px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr,dpr);

  const PAD={l:40,r:16,t:20,b:34};
  const W=width-PAD.l-PAD.r, H=height-PAD.t-PAD.b;

  function toC(x,y){
    return { cx:PAD.l+((x-xMin)/(xMax-xMin))*W, cy:PAD.t+((yMax-y)/(yMax-yMin))*H };
  }

  // background
  ctx.fillStyle="#1e293b"; ctx.fillRect(0,0,width,height);

  // grid
  ctx.strokeStyle=COLORS.grid; ctx.lineWidth=0.5;
  for(let x=Math.ceil(xMin);x<=xMax;x+=tickStep){
    const{cx}=toC(x,0); ctx.beginPath(); ctx.moveTo(cx,PAD.t); ctx.lineTo(cx,PAD.t+H); ctx.stroke();
  }
  for(let y=Math.ceil(yMin);y<=yMax;y+=tickStep){
    const{cy}=toC(0,y); ctx.beginPath(); ctx.moveTo(PAD.l,cy); ctx.lineTo(PAD.l+W,cy); ctx.stroke();
  }

  // shade intervals
  shadeIntervals.forEach(({xStart,xEnd,color})=>{
    const{cx:x1}=toC(xStart,0),{cx:x2}=toC(xEnd,0);
    ctx.fillStyle=color||"rgba(99,102,241,0.18)"; ctx.fillRect(x1,PAD.t,x2-x1,H);
  });

  // axes
  ctx.strokeStyle=COLORS.axis; ctx.lineWidth=1.5;
  const ox=toC(0,0);
  ctx.beginPath(); ctx.moveTo(PAD.l,ox.cy); ctx.lineTo(PAD.l+W,ox.cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox.cx,PAD.t); ctx.lineTo(ox.cx,PAD.t+H); ctx.stroke();
  ctx.fillStyle=COLORS.axis;
  ctx.beginPath(); ctx.moveTo(PAD.l+W+6,ox.cy); ctx.lineTo(PAD.l+W,ox.cy-4); ctx.lineTo(PAD.l+W,ox.cy+4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ox.cx,PAD.t-6); ctx.lineTo(ox.cx-4,PAD.t); ctx.lineTo(ox.cx+4,PAD.t); ctx.fill();

  // tick labels
  ctx.fillStyle="#64748b"; ctx.font="9px 'Space Mono',monospace";
  ctx.textAlign="center";
  for(let x=Math.ceil(xMin);x<=xMax;x+=tickStep){
    if(x===0)continue;
    const{cx,cy:oy}=toC(x,0);
    ctx.fillText(x,cx,oy+12);
    ctx.strokeStyle=COLORS.axis; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(cx,oy-3); ctx.lineTo(cx,oy+3); ctx.stroke();
  }
  ctx.textAlign="right";
  for(let y=Math.ceil(yMin);y<=yMax;y+=tickStep){
    if(y===0)continue;
    const{cx:ox2,cy}=toC(0,y);
    ctx.fillText(y,ox2-4,cy+3);
    ctx.strokeStyle=COLORS.axis; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(ox2-3,cy); ctx.lineTo(ox2+3,cy); ctx.stroke();
  }

  // extra lines
  extraLines.forEach(({x1,y1,x2,y2,color,dash})=>{
    const p1=toC(x1,y1), p2=toC(x2,y2);
    ctx.strokeStyle=color||"#f87171"; ctx.lineWidth=1.5; ctx.setLineDash(dash||[4,3]);
    ctx.beginPath(); ctx.moveTo(p1.cx,p1.cy); ctx.lineTo(p2.cx,p2.cy); ctx.stroke();
    ctx.setLineDash([]);
  });

  // curves
  curves.forEach(({fn,color,dash,xStart,xEnd,lw})=>{
    ctx.strokeStyle=color||COLORS.curve; ctx.lineWidth=lw||2.2; ctx.setLineDash(dash||[]);
    const steps=800;
    const x0=xStart!==undefined?xStart:xMin;
    const x1=xEnd!==undefined?xEnd:xMax;
    ctx.beginPath(); let first=true;
    for(let i=0;i<=steps;i++){
      const x=x0+(i/steps)*(x1-x0);
      let y; try{y=fn(x);}catch(e){continue;}
      if(y===undefined||y===null||!isFinite(y)||y<yMin-20||y>yMax+20){first=true;continue;}
      const{cx,cy}=toC(x,y);
      if(first){ctx.moveTo(cx,cy);first=false;}else ctx.lineTo(cx,cy);
    }
    ctx.stroke(); ctx.setLineDash([]);
  });

  // axis labels
  ctx.fillStyle=COLORS.muted; ctx.font="10px 'Space Mono',monospace";
  ctx.textAlign="left"; ctx.fillText(xLabel,PAD.l+W+8,ox.cy+4);
  ctx.textAlign="center"; ctx.fillText(yLabel,ox.cx,PAD.t-8);
  if(label){
    ctx.fillStyle="#a5b4fc"; ctx.font="italic 12px serif";
    ctx.textAlign="left"; ctx.fillText(label,PAD.l+W-20,PAD.t+16);
  }
}

function makeCanvas(opts){
  const c=document.createElement("canvas");
  document.fonts.ready.then(()=>drawGraph(c,opts));
  setTimeout(()=>drawGraph(c,opts),100);
  return c;
}

// ─── Questions data ─────────────────────────────────────────────────
const questions=[
  {
    id:"1b", section:"Composition & Inverses", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"Suppose m(x) = ∛(3 + x) and n(x) = x³ − 3. Show they are inverses by finding m(n(x)) and n(m(x)).",
    parts:[
      {label:"Find m(n(x))",key:"mnx",answer:"x",hint:"Substitute n(x) = x³−3 into m:\nm(n(x)) = ∛(3 + (x³−3)) = ∛(x³) = x ✓"},
      {label:"Find n(m(x))",key:"nmx",answer:"x",hint:"Substitute m(x) = ∛(3+x) into n:\nn(m(x)) = (∛(3+x))³ − 3 = (3+x) − 3 = x ✓"},
      {label:"Are m and n inverses? Justify.",key:"justify1b",answer:"yes",hint:"Yes — m(n(x)) = x AND n(m(x)) = x, so both compositions give the identity function."},
    ]
  },
  {
    id:"2", section:"Identifying Inverses", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"Which function is the inverse of p(x) = 2/(x−5)? Test q(x) = (x−5)/2 and r(x) = 2/x + 5.",
    parts:[
      {label:"Test q(x) = (x−5)/2 — is it the inverse?",key:"testq",answer:"no",hint:"p(q(x)) = 2/((x−5)/2 − 5) = 2/((x−15)/2) = 4/(x−15) ≠ x.\nSo q is NOT the inverse."},
      {label:"Test r(x) = 2/x + 5 — is it the inverse?",key:"testr",answer:"yes",hint:"p(r(x)) = 2/(2/x + 5 − 5) = 2/(2/x) = x ✓\nr(p(x)) = 2/(2/(x−5)) + 5 = (x−5) + 5 = x ✓\nr IS the inverse."},
      {label:"Which is the inverse of p?",key:"which2",answer:"r(x)",hint:"r(x) = 2/x + 5 is the inverse of p(x) = 2/(x−5)."},
    ]
  },
  {
    id:"3b", section:"Horizontal Line Test", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"Here's the graph of f(x) = x². Using the horizontal line test, explain why f(x) is not one-to-one and hence non-invertible.",
    graphHtml:"graph-3b",
    parts:[
      {label:"Why does f(x) = x² fail the horizontal line test?",key:"hlt3b",answer:"two x values",hint:"A horizontal line (e.g. y = 4) crosses the parabola at two points: x = 2 and x = −2.\nThis means it fails the horizontal line test."},
      {label:"Why is f(x) non-invertible over all reals?",key:"noninv3b",answer:"not one-to-one",hint:"Because f(2) = f(−2) = 4, the function is not one-to-one — two inputs give the same output, so no inverse exists."},
    ]
  },
  {
    id:"3c", section:"One-to-One Functions", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"Suppose g(x) = x³. Is g one-to-one? Is it invertible? Draw a rough sketch to justify.",
    graphHtml:"graph-3c",
    parts:[
      {label:"Is g(x) = x³ one-to-one? How do you know?",key:"onetoone3c",answer:"yes",hint:"Yes — every horizontal line crosses the graph at most once (strictly increasing). It passes the HLT."},
      {label:"Is g(x) = x³ invertible? Justify.",key:"inv3c",answer:"yes",hint:"Yes — because it is one-to-one, its inverse exists: g⁻¹(x) = ∛x."},
    ]
  },
  {
    id:"4a", section:"HLT & Invertibility", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"In general, a function is invertible if its graph passes the horizontal line test. Explain how the HLT and invertibility are linked.",
    parts:[
      {label:"Your explanation:",key:"explain4a",answer:"one-to-one",hint:"If every horizontal line crosses the graph at most once → the function is one-to-one → each output comes from exactly one input → an inverse exists.\nIf any line crosses more than once → not one-to-one → non-invertible."},
    ]
  },
  {
    id:"4b", section:"Invertibility from Graphs", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"Graphs of p, q, and r are shown. In each case justify whether the function is invertible or not.",
    graphHtml:"graph-4b",
    parts:[
      {label:"Is p invertible? Justify.",key:"p4b",answer:"yes",hint:"Yes — p is strictly increasing throughout. Every horizontal line crosses it at most once → passes HLT → invertible."},
      {label:"Is q invertible? Justify.",key:"q4b",answer:"yes",hint:"Yes — q is strictly decreasing. Every horizontal line crosses at most once → passes HLT → invertible."},
      {label:"Is r invertible? Justify.",key:"r4b",answer:"no",hint:"No — r has a local max and local min. Horizontal lines near those values cross the graph more than once → fails HLT → NOT invertible."},
    ]
  },
  {
    id:"4c", section:"Absolute Value", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"Is m(x) = |x| an invertible function? Justify.",
    graphHtml:"graph-4c",
    parts:[
      {label:"Your answer and justification:",key:"abs4c",answer:"not invertible",hint:"No — m(x) = |x| is not one-to-one: m(2) = m(−2) = 2.\nA horizontal line y = 2 crosses the graph at two points → fails HLT → non-invertible over all reals."},
    ]
  },
  {
    id:"5b", section:"Finding Inverses (Restricted Domain)", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"If g(x) = x², x ≥ 0, find g⁻¹(x) and state its domain and range.",
    parts:[
      {label:"Find g⁻¹(x):",key:"ginv5b",answer:"√x",hint:"Swap x and y: x = y², y ≥ 0 → y = √x.\nSo g⁻¹(x) = √x."},
      {label:"Domain of g⁻¹(x):",key:"dom5b",answer:"x ≥ 0",hint:"Domain of g⁻¹ = Range of g = [0, ∞)."},
      {label:"Range of g⁻¹(x):",key:"ran5b",answer:"y ≥ 0",hint:"Range of g⁻¹ = Domain of g = [0, ∞)."},
    ]
  },
  {
    id:"5c", section:"Invertible Intervals", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"Here's the graph of f(x) = x². Mark three intervals on the graph where f(x) is invertible.",
    graphHtml:"graph-5c",
    parts:[
      {label:"Interval 1 (e.g. x ≥ 0):",key:"int1_5c",answer:"x ≥ 0",hint:"x ≥ 0 — the right half, where f is strictly increasing → invertible."},
      {label:"Interval 2 (e.g. x ≤ 0):",key:"int2_5c",answer:"x ≤ 0",hint:"x ≤ 0 — the left half, where f is strictly decreasing → invertible."},
      {label:"Interval 3 (a sub-interval):",key:"int3_5c",answer:"0 ≤ x ≤ 2",hint:"Any sub-interval of a monotone piece works, e.g. [0,2], [1,4], or [−3,0]."},
    ]
  },
  {
    id:"6a", section:"Restricted Domain Inverse", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"For x ≤ 0, is h(x) = x² invertible? If yes, find h⁻¹(x) and state its domain and range.",
    graphHtml:"graph-6a",
    parts:[
      {label:"Is h(x) = x² invertible for x ≤ 0?",key:"inv6a",answer:"yes",hint:"Yes — on x ≤ 0 the parabola is strictly decreasing (one-to-one) → invertible."},
      {label:"Find h⁻¹(x):",key:"hinv6a",answer:"-√x",hint:"Swap x and y: x = y², y ≤ 0 → y = −√x.\nSo h⁻¹(x) = −√x."},
      {label:"Domain of h⁻¹:",key:"domh6a",answer:"x ≥ 0",hint:"Domain of h⁻¹ = Range of h = [0, ∞)."},
      {label:"Range of h⁻¹:",key:"ranh6a",answer:"y ≤ 0",hint:"Range of h⁻¹ = Domain of h = (−∞, 0]."},
    ]
  },
  {
    id:"6b", section:"Restricting Sinusoidal Domain", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"Here's the graph of p(x) (a cosine-like wave, range [−1, 1]). Restrict the domain so p is invertible and covers its full range.",
    graphHtml:"graph-6b",
    parts:[
      {label:"State a valid restricted domain:",key:"dom6b",answer:"0 ≤ x ≤ π",hint:"e.g. [0, π] — on this interval cosine decreases strictly from 1 to −1, covering the full range [−1, 1].\nAny single monotone half-period works."},
    ]
  },
  {
    id:"7b", section:"Inverse in Context", tag:"WE DO", tagClass:"tag-wedo",
    prompt:"Monthly water bill: B = p(g) = 20 + 0.004g  (B in $, g in gallons).",
    graphHtml:"graph-7b",
    parts:[
      {label:"Find p⁻¹:",key:"pinv7b",answer:"g = (B - 20) / 0.004",hint:"Swap B and g then solve:\ng = (B − 20) / 0.004\nSo p⁻¹(B) = (B − 20) / 0.004."},
      {label:"Find p⁻¹(73):",key:"p73",answer:"13250",hint:"p⁻¹(73) = (73 − 20) / 0.004 = 53 / 0.004 = 13,250 gallons."},
      {label:"What does p⁻¹(73) represent in context?",key:"context7b",answer:"gallons",hint:"It represents the amount of water consumed (in gallons) when the monthly bill is $73."},
    ]
  },
  {
    id:"8", section:"Inverse in Context", tag:"YOUR TURN", tagClass:"tag-yourturn",
    prompt:"Car value: V = f(t) = 21000 − 1500t,  0 ≤ t ≤ 14.",
    graphHtml:"graph-8",
    parts:[
      {label:"Find f⁻¹. What does it represent?",key:"finv8",answer:"t = (21000 - V) / 1500",hint:"Swap V and t and solve:\nt = (21000 − V) / 1500\nThis gives the age of the car (years) given its value V in $."},
      {label:"Domain of f⁻¹:",key:"domf8",answer:"0 ≤ V ≤ 21000",hint:"Domain of f⁻¹ = Range of f.\nAt t=0, V=21000; at t=14, V=0. So domain is [0, 21000]."},
      {label:"Range of f⁻¹:",key:"ranf8",answer:"0 ≤ t ≤ 14",hint:"Range of f⁻¹ = Domain of f = [0, 14] years."},
    ]
  },
];

// ─── Graph builders ─────────────────────────────────────────────────
function buildGraphs(){
  // 3b — parabola + HLT line
  const g3b=document.getElementById("graph-3b");
  g3b.appendChild(makeCanvas({width:300,height:230,xMin:-3,xMax:3,yMin:-1,yMax:5.5,label:"f",tickStep:1,
    curves:[{fn:x=>x*x,color:"#818cf8"}],
    extraLines:[{x1:-3,y1:4,x2:3,y2:4,color:"#f87171",dash:[6,3]}]
  }));
  g3b.insertAdjacentHTML("beforeend","<p class='graph-note'>Red dashed: a horizontal line crossing f at x = −2 and x = 2.</p>");

  // 3c — cubic
  const g3c=document.getElementById("graph-3c");
  g3c.appendChild(makeCanvas({width:300,height:250,xMin:-3,xMax:3,yMin:-8,yMax:8,label:"g",tickStep:2,
    curves:[{fn:x=>x*x*x,color:"#4ade80"}]
  }));

  // 4b — three graphs side by side
  const g4b=document.getElementById("graph-4b");
  const wrap=document.createElement("div"); wrap.className="three-graphs"; g4b.appendChild(wrap);
  // p: sigmoid strictly increasing
  const dp=document.createElement("div");
  dp.appendChild(makeCanvas({width:190,height:165,xMin:-5,xMax:5,yMin:-2,yMax:5,label:"p",tickStep:1,
    curves:[{fn:x=>4/(1+Math.exp(-1.5*x))-2,color:"#818cf8"}]
  }));
  dp.insertAdjacentHTML("beforeend","<span class='graph-label'>p — invertible</span>"); wrap.appendChild(dp);
  // q: strictly decreasing -1/x
  const dq=document.createElement("div");
  dq.appendChild(makeCanvas({width:190,height:165,xMin:-5,xMax:5,yMin:-5,yMax:5,label:"q",tickStep:1,
    curves:[
      {fn:x=>x<-0.2?-1/x:null,color:"#38bdf8",xStart:-5,xEnd:-0.22},
      {fn:x=>x>0.2?-1/x:null,color:"#38bdf8",xStart:0.22,xEnd:5},
    ]
  }));
  dq.insertAdjacentHTML("beforeend","<span class='graph-label'>q — invertible</span>"); wrap.appendChild(dq);
  // r: cubic with turns x³-3x
  const dr=document.createElement("div");
  dr.appendChild(makeCanvas({width:190,height:165,xMin:-5,xMax:5,yMin:-5,yMax:5,label:"r",tickStep:1,
    curves:[{fn:x=>x*x*x-3*x,color:"#f87171"}]
  }));
  dr.insertAdjacentHTML("beforeend","<span class='graph-label'>r — NOT invertible</span>"); wrap.appendChild(dr);

  // 4c — absolute value + HLT
  const g4c=document.getElementById("graph-4c");
  g4c.appendChild(makeCanvas({width:280,height:200,xMin:-4,xMax:4,yMin:-0.5,yMax:4,label:"m",tickStep:1,
    curves:[{fn:x=>Math.abs(x),color:"#fb923c"}],
    extraLines:[{x1:-4,y1:2,x2:4,y2:2,color:"#f87171",dash:[5,3]}]
  }));
  g4c.insertAdjacentHTML("beforeend","<p class='graph-note'>Red dashed: HLT failing at y = 2.</p>");

  // 5c — parabola + shaded intervals
  const g5c=document.getElementById("graph-5c");
  g5c.appendChild(makeCanvas({width:320,height:230,xMin:-5,xMax:5,yMin:-1,yMax:9,label:"f",tickStep:1,
    shadeIntervals:[
      {xStart:-5,xEnd:0,color:"rgba(129,140,248,0.18)"},
      {xStart:0,xEnd:2,color:"rgba(74,222,128,0.18)"},
    ],
    curves:[{fn:x=>x*x,color:"#818cf8"}]
  }));
  g5c.insertAdjacentHTML("beforeend","<p class='graph-note'>Purple: x ≤ 0 (decreasing). Green: example sub-interval [0, 2] (increasing).</p>");

  // 6a — left-half parabola
  const g6a=document.getElementById("graph-6a");
  g6a.appendChild(makeCanvas({width:280,height:210,xMin:-4,xMax:1,yMin:-0.5,yMax:9,label:"h",tickStep:1,
    shadeIntervals:[{xStart:-4,xEnd:0,color:"rgba(56,189,248,0.15)"}],
    curves:[{fn:x=>x<=0?x*x:null,color:"#38bdf8",xStart:-4,xEnd:0}]
  }));
  g6a.insertAdjacentHTML("beforeend","<p class='graph-note'>Only the x ≤ 0 portion of h(x) = x² is shown (shaded blue).</p>");

  // 6b — cosine with restricted domain shaded
  const g6b=document.getElementById("graph-6b");
  g6b.appendChild(makeCanvas({width:430,height:200,xMin:-5.5,xMax:5.5,yMin:-1.6,yMax:1.8,tickStep:1,label:"p",xLabel:"x",yLabel:"y",
    shadeIntervals:[{xStart:0,xEnd:Math.PI,color:"rgba(74,222,128,0.18)"}],
    curves:[{fn:x=>Math.cos(x),color:"#818cf8"}],
    extraLines:[
      {x1:0,y1:-1.6,x2:0,y2:1.6,color:"#4ade80",dash:[4,3]},
      {x1:Math.PI,y1:-1.6,x2:Math.PI,y2:1.6,color:"#4ade80",dash:[4,3]},
    ]
  }));
  g6b.insertAdjacentHTML("beforeend","<p class='graph-note'>Green shaded: one valid restricted domain [0, π] where p is strictly decreasing.</p>");

  // 7b — linear water bill
  const g7b=document.getElementById("graph-7b");
  g7b.appendChild(makeCanvas({width:300,height:170,xMin:0,xMax:15000,yMin:0,yMax:80,label:"p",tickStep:3000,xLabel:"g (gal)",yLabel:"B ($)",
    curves:[{fn:g=>20+0.004*g,color:"#4ade80",xStart:0,xEnd:15000}]
  }));

  // 8 — linear car value
  const g8=document.getElementById("graph-8");
  g8.appendChild(makeCanvas({width:320,height:190,xMin:0,xMax:14,yMin:0,yMax:22000,label:"f",tickStep:2,xLabel:"t (yr)",yLabel:"V ($)",
    curves:[{fn:t=>21000-1500*t,color:"#38bdf8",xStart:0,xEnd:14}]
  }));
}

// ─── Render questions ────────────────────────────────────────────────
function renderQuestions(){
  const container=document.getElementById("questions-container");
  questions.forEach(q=>{
    const card=document.createElement("div");
    card.className="qcard";
    card.innerHTML=`
      <div class="qcard-header">
        <div class="qid">${q.id}</div>
        <div>
          <span class="qtag ${q.tagClass}">${q.tag}</span>
          <div class="qsection">${q.section}</div>
          <p class="qprompt">${q.prompt}</p>
        </div>
      </div>
      ${q.graphHtml?`<div class="graph-area" id="${q.graphHtml}"></div>`:""}
      <div class="parts" id="parts-${q.id}"></div>
    `;
    container.appendChild(card);
    const partsEl=card.querySelector(`#parts-${q.id}`);
    q.parts.forEach(part=>{
      const div=document.createElement("div");
      div.className="part";
      div.innerHTML=`
        <label>${part.label}</label>
        <div class="part-row">
          <input type="text" id="inp-${part.key}" placeholder="Type your answer…" autocomplete="off"/>
          <button class="check-btn" onclick="checkPart('${part.key}')">Check</button>
        </div>
        <div class="status" id="status-${part.key}" style="display:none"></div>
      `;
      partsEl.appendChild(div);
      div.querySelector("input").addEventListener("keydown",e=>{if(e.key==="Enter")checkPart(part.key);});
    });
  });
}

// ─── Answer checking ─────────────────────────────────────────────────
const allParts={};
questions.forEach(q=>q.parts.forEach(p=>allParts[p.key]=p));

function normalize(s){return s.toLowerCase().replace(/[^a-z0-9√π.]/g,"").trim();}
function checkAnswer(user,correct){
  const u=normalize(user);
  const kws=correct.toLowerCase().split(/[\s,./()]+/).filter(w=>w.length>1);
  return kws.some(kw=>u.includes(kw.replace(/[^a-z0-9√]/g,"")));
}

function checkPart(key){
  const part=allParts[key];
  const inp=document.getElementById("inp-"+key);
  const statusEl=document.getElementById("status-"+key);
  const correct=checkAnswer(inp.value,part.answer);
  inp.className=correct?"correct":"wrong";
  statusEl.style.display="block";
  statusEl.className="status "+(correct?"ok":"bad");
  statusEl.textContent=correct?"✓ Looks good!":"✗ Not quite — click Check for a hint.";
  showDialog(correct,part.label,part.hint);
}

// ─── Dialog ──────────────────────────────────────────────────────────
function showDialog(correct,label,hint){
  document.getElementById("dialog-emoji").textContent=correct?"✅":"💡";
  document.getElementById("dialog-title").textContent=correct?"Correct!":"Not quite yet…";
  document.getElementById("dialog-title").style.color=correct?"#4ade80":"#f87171";
  document.getElementById("dialog-label").textContent=label;
  document.getElementById("dialog-hint").textContent=hint;
  document.getElementById("dialog-hint").style.borderLeft="3px solid "+(correct?"#4ade80":"#f87171");
  const btn=document.getElementById("dialog-close");
  btn.style.background=correct?"linear-gradient(135deg,#4ade80,#22d3ee)":"linear-gradient(135deg,#f87171,#fb923c)";
  document.getElementById("dialog-box").style.border="2px solid "+(correct?"#4ade80":"#f87171");
  document.getElementById("dialog-overlay").classList.add("show");
}
function closeDialog(e){if(e.target===document.getElementById("dialog-overlay"))closeDialogBtn();}
function closeDialogBtn(){document.getElementById("dialog-overlay").classList.remove("show");}

// ─── Init ────────────────────────────────────────────────────────────
renderQuestions();
buildGraphs();
</script>
